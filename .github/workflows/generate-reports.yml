name: Generate Reports

# キーワード(Issue)を取得し AI レポートを生成して Pages へ公開するワークフロー
on:
  workflow_dispatch: {}
  # Phase 4 で有効化: 毎日 JST 07:00 (UTC 22:00) に自動生成
  # schedule:
  #   - cron: "0 22 * * *"

# 同時実行は 1 つに制限（フィード/Pages の競合を避ける）
concurrency:
  group: generate-reports
  cancel-in-progress: false

permissions:
  contents: write  # 生成レポートを site/ にコミットして蓄積するため
  issues: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Generate reports
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SITE_BASE_URL: ${{ steps.pages.outputs.base_url }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAX_FEED_ITEMS: "20"
          RETENTION_MAX_AGE_DAYS: "30"
          RETENTION_MAX_COUNT: "100"
        run: python -m src.main

      - name: Commit accumulated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site
          if git diff --staged --quiet; then
            echo "コミットする変更なし"
          else
            git commit -m "chore(reports): レポート蓄積を更新"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
