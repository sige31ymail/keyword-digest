name: Generate Reports

# キーワード(Issue)を取得し AI レポートを生成して Pages へ公開するワークフロー
on:
  workflow_dispatch: {}
  # Phase 4 で有効化: 毎日 JST 07:00 (UTC 22:00) に自動生成
  # schedule:
  #   - cron: "0 22 * * *"

# 同時実行は 1 つに制限（フィード/Pages の競合を避ける）
concurrency:
  group: generate-reports
  cancel-in-progress: false

permissions:
  contents: write  # 生成レポートを site/ にコミットして蓄積するため
  issues: write  # 生成成功した Issue を自動クローズするため
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Generate reports
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SITE_BASE_URL: ${{ steps.pages.outputs.base_url }}
          # 主: DeepSeek 多段パイプライン（クエリ生成→検索→要約→構成→本文→検証）
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: "deepseek-v4-pro"
          # 多角的に深掘りするため検索クエリ数と記事長を増やす（コスト増を許容）
          MAX_SEARCH_QUERIES: "5"
          ARTICLE_MIN_CHARS: "1800"
          ARTICLE_MAX_CHARS: "3000"
          # 検索バックエンド（既定 Tavily）。DeepSeek には検索機能がないため別途必要
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TAVILY_MAX_RESULTS: "6"
          # 予備の検索バックエンド兼 後方互換の単段生成（Tavily 未設定時に使用）
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: "gpt-4o-mini"
          OPENAI_WEB_SEARCH: "true"
          OPENAI_SEARCH_CONTEXT_SIZE: "medium"
          # 副: 生成フォールバック（検索なし単段）
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAX_FEED_ITEMS: "20"
          # 一度だけ生成して恒久保存: 記事は削除せず、成功した Issue は自動クローズ
          RETENTION_ENABLED: "false"
          AUTO_CLOSE_ISSUES: "true"
          # 保持ポリシーを有効化する場合のみ参照される（RETENTION_ENABLED=true）
          RETENTION_MAX_AGE_DAYS: "30"
          RETENTION_MAX_COUNT: "100"
        run: python -m src.main

      - name: Commit accumulated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site
          if git diff --staged --quiet; then
            echo "コミットする変更なし"
          else
            git commit -m "chore(reports): レポート蓄積を更新"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
